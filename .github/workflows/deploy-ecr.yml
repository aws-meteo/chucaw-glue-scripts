name: Deploy to Amazon ECR

# Solo se ejecuta DESPUÉS de que el CI Build termine
on:
  workflow_run:
    workflows: ["CI Docker Build"]
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: us-east-1                   
  ECR_REPOSITORY: chucaw-pangu-preprocessor

jobs:
  deploy:
    name: Push to ECR
    runs-on: ubuntu-latest
    # Esta línea es vital: solo ejecuta si el build anterior fue exitoso
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login a Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Construir, etiquetar y subir imagen a Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} 
      run: |
        echo "Construyendo la imagen definitiva..."
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        
        echo "Subiendo imagen a ECR..."
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest