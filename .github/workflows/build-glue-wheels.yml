name: Build Glue Wheel Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - development
    paths:
      - "pyproject.toml"
      - "requirements.txt"
      - "requirements-glue.txt"
      - "lista_de_glue50.txt"
      - "scripts/build_glue_artifacts.ps1"
      - "src/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build project wheel and Glue dependency bundle
        shell: pwsh
        run: |
          ./scripts/build_glue_artifacts.ps1 `
            -Python python `
            -OutputDir dist `
            -RequirementsFile requirements-glue.txt `
            -GlueProvidedList lista_de_glue50.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glue-wheel-artifacts
          path: dist/**
